<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrap">
    <h2>Expense Tracker</h2>

    <div class="summary">
      <div class="stat">
        <div class="stat-label">Total Spent</div>
        <div class="stat-val" id="total">₹0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Transactions</div>
        <div class="stat-val" id="count">0</div>
      </div>
    </div>

    <div class="form-row">
      <input type="text" id="name" placeholder="Expense name..." maxlength="40" />
      <input type="number" id="amount" placeholder="₹ Amount" min="0" step="0.01" />
      <select id="cat">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Health">Health</option>
        <option value="Other">Other</option>
      </select>
      <button class="btn-add" onclick="addExpense()">+ Add</button>
    </div>
    <div class="err" id="err">Please enter a name and valid amount.</div>

    <div class="filter-row" id="filters"></div>

    <div class="list" id="list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
